<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — DeepShield AI</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png" />
    <link rel="stylesheet" href="/static/style.css">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        blue: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030712;
            font-family: 'Manrope', 'Inter', sans-serif;
        }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .hero-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        @keyframes logoPulse {
            0%, 100% {
                box-shadow: 0 0 8px rgba(99, 102, 241, 0.2);
                border-color: rgba(99, 102, 241, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
                border-color: rgba(99, 102, 241, 0.6);
            }
        }
        .logo-pulse {
            animation: logoPulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center p-6 hero-grid relative overflow-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[20%] left-[10%] w-[400px] h-[400px] bg-blue-600/10 blur-[130px] rounded-full"></div>
        <div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-indigo-600/5 blur-[130px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md glass rounded-3xl p-8 shadow-2xl relative z-10 bg-[#070b14]/80">
        <div class="flex flex-col items-center mb-6">
            <a href="/" class="flex items-center gap-3 mb-4 group">
                <img src="/static/images/logo.png" class="w-12 h-12 object-cover rounded-full shadow-lg border border-indigo-500/30 group-hover:border-indigo-400 transition-all duration-300 logo-pulse" alt="DeepShield Logo">
            </a>
            <h2 class="text-white text-2xl font-bold tracking-tight">Enter Verification Code</h2>
            <p class="text-slate-500 text-xs mt-1 font-mono uppercase tracking-wider">Verification & Reset Console</p>
        </div>

        <!-- Dynamic Alert Container -->
        <div id="alertContainer" class="hidden mb-4 p-4 rounded-xl text-sm border transition-all duration-300"></div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required readonly
                        class="block w-full pl-10 pr-4 py-2.5 bg-[#070b14]/60 border border-white/5 rounded-xl text-slate-400 text-sm focus:outline-none cursor-not-allowed">
                </div>
            </div>

            <div>
                <label for="otp" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">One-Time OTP Code</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="text" id="otp" required maxlength="6" pattern="\d{6}"
                        class="block w-full pl-10 pr-4 py-2.5 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono tracking-widest text-center"
                        placeholder="••••••">
                </div>
            </div>

            <!-- Password & Confirm Password Grid -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="password" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" required oninput="checkPasswordStrength()"
                            class="block w-full pl-10 pr-10 py-2.5 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('password', 'passwordEye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <i class="fa-solid fa-eye" id="passwordEye"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="confirm_password" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">Confirm</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="confirm_password" required
                            class="block w-full pl-10 pr-10 py-2.5 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('confirm_password', 'confirmPasswordEye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <i class="fa-solid fa-eye" id="confirmPasswordEye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Password Strength Visual Meter -->
            <div class="mt-2 space-y-1">
                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden flex gap-1">
                    <div id="meter1" class="h-full bg-slate-800 flex-1 transition-all duration-300"></div>
                    <div id="meter2" class="h-full bg-slate-800 flex-1 transition-all duration-300"></div>
                    <div id="meter3" class="h-full bg-slate-800 flex-1 transition-all duration-300"></div>
                </div>
                <div class="flex justify-between items-center text-[10px] font-mono">
                    <span id="strengthText" class="text-slate-500 uppercase">Input Password</span>
                    <span class="text-slate-550">Min 8 chars, 1 upper, 1 special</span>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-sm tracking-wide transition-all duration-300 shadow-[0_4px_15px_rgba(99,102,241,0.2)] hover:shadow-[0_4px_25px_rgba(99,102,241,0.4)]">
                Reset Password
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-slate-500 font-medium">
            Remember credentials? 
            <a href="/login" class="text-indigo-400 hover:text-indigo-300 transition font-semibold">Log In</a>
        </div>

        <div class="mt-6 pt-5 border-t border-white/5 flex flex-col items-center gap-2">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] font-mono font-semibold uppercase tracking-wider">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                94.4% Detection Accuracy
            </div>
            <div class="text-[9px] font-mono text-slate-500 uppercase tracking-widest text-center leading-relaxed">
                RGB + FFT Fusion • Research Validated
            </div>
        </div>
    </div>

    <script>
        // Extract Email from URL query parameters
        window.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get("email");
            if (emailParam) {
                document.getElementById("email").value = emailParam;
            } else {
                showAlert("No email address provided in link. Please go back to recovery portal.", "error");
                document.getElementById("submitBtn").disabled = true;
            }
        });

        function togglePasswordVisibility(inputId, eyeId) {
            const pwdInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(eyeId);
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                pwdInput.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }

        let currentStrength = 0;

        function checkPasswordStrength() {
            const password = document.getElementById("password").value;
            const meter1 = document.getElementById("meter1");
            const meter2 = document.getElementById("meter2");
            const meter3 = document.getElementById("meter3");
            const strengthText = document.getElementById("strengthText");

            meter1.className = "h-full bg-slate-800 flex-1 transition-all duration-300";
            meter2.className = "h-full bg-slate-800 flex-1 transition-all duration-300";
            meter3.className = "h-full bg-slate-800 flex-1 transition-all duration-300";

            if (password.length === 0) {
                strengthText.textContent = "Input Password";
                strengthText.className = "text-slate-500 uppercase";
                currentStrength = 0;
                return;
            }

            let score = 0;
            const hasLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            if (hasLength) score++;
            if (hasUpper && hasLower) score++;
            if (hasDigit && hasSpecial) score++;

            // Require all 5 criteria for the maximum "Strong" score of 3
            const isFullyCompliant = hasLength && hasUpper && hasLower && hasDigit && hasSpecial;

            if (isFullyCompliant) {
                currentStrength = 3;
                meter1.className = "h-full bg-emerald-500 flex-1 transition-all duration-300";
                meter2.className = "h-full bg-emerald-500 flex-1 transition-all duration-300";
                meter3.className = "h-full bg-emerald-500 flex-1 transition-all duration-300";
                strengthText.textContent = "Strong (Secure)";
                strengthText.className = "text-emerald-500 font-bold uppercase";
            } else if (score === 2) {
                currentStrength = 2;
                meter1.className = "h-full bg-amber-500 flex-1 transition-all duration-300";
                meter2.className = "h-full bg-amber-500 flex-1 transition-all duration-300";
                strengthText.textContent = "Medium (Moderate)";
                strengthText.className = "text-amber-500 font-bold uppercase";
            } else {
                currentStrength = 1;
                meter1.className = "h-full bg-red-500 flex-1 transition-all duration-300";
                strengthText.textContent = "Weak (Unsafe)";
                strengthText.className = "text-red-500 font-bold uppercase";
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById("alertContainer");
            alertContainer.textContent = message;
            alertContainer.classList.remove("hidden", "bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400", "bg-red-950/30", "border-red-500/30", "text-red-400");
            
            if (type === "success") {
                alertContainer.classList.add("bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400");
            } else {
                alertContainer.classList.add("bg-red-950/30", "border-red-500/30", "text-red-400");
            }
        }

        document.getElementById("resetForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const email = document.getElementById("email").value.trim();
            const otp = document.getElementById("otp").value.trim();
            const password = document.getElementById("password").value;
            const confirm_password = document.getElementById("confirm_password").value;
            const submitBtn = document.getElementById("submitBtn");

            // Client-side checks
            if (password !== confirm_password) {
                showAlert("Passwords do not match.", "error");
                return;
            }

            if (currentStrength < 3) {
                showAlert("Please enter a stronger password (must meet all complexity requirements: 8+ chars, uppercase, lowercase, digit, and special characters).", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Resetting Password...';

            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            try {
                const response = await fetch("/api/reset-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRF-Token": csrfToken
                    },
                    body: JSON.stringify({
                        email,
                        otp,
                        password,
                        confirm_password
                    })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    showAlert(data.message || "Password successfully reset! Redirecting to login...", "success");
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2500);
                } else {
                    showAlert(data.error || "Password reset failed. Please check OTP code.", "error");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Reset Password";
                }
            } catch (err) {
                showAlert("Network error occurred. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Reset Password";
            }
        });
    </script>
    <script src="/static/js/main.js"></script>
</body>
</html>
