<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — DeepShield AI</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png" />
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        blue: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030712;
            font-family: 'Manrope', 'Inter', sans-serif;
        }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .hero-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        @keyframes logoPulse {
            0%, 100% {
                box-shadow: 0 0 8px rgba(99, 102, 241, 0.2);
                border-color: rgba(99, 102, 241, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
                border-color: rgba(99, 102, 241, 0.6);
            }
        }
        .logo-pulse {
            animation: logoPulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center p-6 hero-grid relative overflow-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[20%] left-[10%] w-[400px] h-[400px] bg-blue-600/10 blur-[130px] rounded-full"></div>
        <div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-indigo-600/5 blur-[130px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md glass rounded-3xl p-8 shadow-2xl relative z-10 bg-[#070b14]/80">
        <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-[0_4px_15px_rgba(99,102,241,0.4)] mb-4">
                <i class="fa-solid fa-envelope-open-text text-white text-xl"></i>
            </div>
            <h2 class="text-white text-2xl font-bold tracking-tight">Verify Your Email</h2>
            <p class="text-slate-500 text-xs mt-1 font-mono uppercase tracking-wider">Account Verification Console</p>
        </div>

        <p class="text-center text-xs text-slate-400 mb-6 leading-relaxed">
            A secure 6-digit OTP verification code has been dispatched to:<br>
            <span class="text-white font-semibold font-mono text-[13px] block mt-1 break-all" id="targetEmailDisplay">{{ email or 'your registered email' }}</span>
        </p>

        <!-- Dynamic Alert Container -->
        <div id="alertContainer" class="hidden mb-5 p-4 rounded-xl text-sm border transition-all duration-300"></div>

        <form id="otpForm" class="space-y-6">
            <!-- 6-digit OTP Input Code -->
            <div class="flex justify-between gap-2" id="otpInputGroup">
                <input type="text" maxlength="1" data-index="0" required class="otp-box w-12 h-12 text-center text-xl font-bold bg-[#0B1220] border border-[#1F2937] rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono" />
                <input type="text" maxlength="1" data-index="1" required class="otp-box w-12 h-12 text-center text-xl font-bold bg-[#0B1220] border border-[#1F2937] rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono" />
                <input type="text" maxlength="1" data-index="2" required class="otp-box w-12 h-12 text-center text-xl font-bold bg-[#0B1220] border border-[#1F2937] rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono" />
                <input type="text" maxlength="1" data-index="3" required class="otp-box w-12 h-12 text-center text-xl font-bold bg-[#0B1220] border border-[#1F2937] rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono" />
                <input type="text" maxlength="1" data-index="4" required class="otp-box w-12 h-12 text-center text-xl font-bold bg-[#0B1220] border border-[#1F2937] rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono" />
                <input type="text" maxlength="1" data-index="5" required class="otp-box w-12 h-12 text-center text-xl font-bold bg-[#0B1220] border border-[#1F2937] rounded-xl text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200 font-mono" />
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-sm tracking-wide transition-all duration-300 shadow-[0_4px_15px_rgba(99,102,241,0.2)] hover:shadow-[0_4px_25px_rgba(99,102,241,0.4)]">
                Verify Credentials
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-500 font-medium space-y-3">
            <div>
                Didn't receive the verification code?
                <button type="button" id="resendBtn" disabled onclick="resendOTP()" class="text-indigo-400 hover:text-indigo-300 transition font-semibold disabled:text-slate-550 disabled:cursor-not-allowed ml-1">
                    Resend OTP (60s)
                </button>
            </div>
            <div>
                <a href="/login" class="text-slate-400 hover:text-white transition font-semibold flex items-center justify-center gap-1.5 mt-2">
                    <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to Log In
                </a>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5 flex flex-col items-center gap-2">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] font-mono font-semibold uppercase tracking-wider">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                Enterprise Grade Security
            </div>
        </div>
    </div>

    <script>
        const email = "{{ email }}";
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById("alertContainer");
            alertContainer.textContent = message;
            alertContainer.classList.remove("hidden", "bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400", "bg-red-950/30", "border-red-500/30", "text-red-400");
            
            if (type === "success") {
                alertContainer.classList.add("bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400");
            } else {
                alertContainer.classList.add("bg-red-950/30", "border-red-500/30", "text-red-400");
            }
            alertContainer.classList.remove("hidden");
        }

        // --- Autocomplete autofocus input shifting ---
        const inputs = document.querySelectorAll(".otp-box");
        
        inputs.forEach((input, i) => {
            input.addEventListener("input", (e) => {
                const val = e.target.value;
                // Keep only digits
                e.target.value = val.replace(/[^0-9]/g, "");
                
                if (e.target.value && i < inputs.length - 1) {
                    inputs[i + 1].focus();
                }
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && i > 0) {
                    inputs[i - 1].focus();
                }
            });

            // Handle paste action
            input.addEventListener("paste", (e) => {
                e.preventDefault();
                const pastedText = (e.clipboardData || window.clipboardData).getData("text");
                const cleanDigits = pastedText.replace(/[^0-9]/g, "").slice(0, 6);
                
                for (let j = 0; j < cleanDigits.length; j++) {
                    if (inputs[j]) {
                        inputs[j].value = cleanDigits[j];
                        if (inputs[j + 1]) {
                            inputs[j + 1].focus();
                        }
                    }
                }
            });
        });

        // Initialize focus on load
        if (inputs[0]) inputs[0].focus();

        // --- Resend OTP Countdown Timer ---
        let countdown = 60;
        let timerInterval;
        const resendBtn = document.getElementById("resendBtn");

        function startTimer() {
            countdown = 60;
            resendBtn.disabled = true;
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                countdown--;
                resendBtn.textContent = `Resend OTP (${countdown}s)`;
                
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.textContent = "Resend OTP";
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        startTimer();

        // --- Submit OTP logic ---
        document.getElementById("otpForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            // Collect digits
            let otp = "";
            inputs.forEach(input => otp += input.value);
            
            if (otp.length !== 6) {
                showAlert("Please enter all 6 digits of the OTP code.", "error");
                return;
            }

            const submitBtn = document.getElementById("submitBtn");
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Verifying...';

            try {
                const response = await fetch("/api/verify-otp", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRF-Token": csrfToken
                    },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    showAlert(data.message || "Email verified! Redirecting to login...", "success");
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2000);
                } else {
                    showAlert(data.error || "Verification failed.", "error");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Verify Credentials";
                    
                    // Clear inputs on failure to allow retry
                    inputs.forEach(inp => inp.value = "");
                    inputs[0].focus();
                }
            } catch (err) {
                showAlert("Network error. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Verify Credentials";
            }
        });

        // --- Resend OTP Logic ---
        async function resendOTP() {
            resendBtn.disabled = true;
            resendBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-1"></i>Sending...';
            
            try {
                const response = await fetch("/api/resend-otp", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRF-Token": csrfToken
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    showAlert("A new verification code has been sent to your email.", "success");
                    
                    // Display simulator code if visible
                    if (data.debug_otp) {
                        setTimeout(() => {
                            showAlert(`[SIMULATION] Verification OTP is: ${data.debug_otp}`, "success");
                        }, 500);
                    }
                    startTimer();
                } else {
                    showAlert(data.error || "Failed to resend verification code.", "error");
                    resendBtn.disabled = false;
                    resendBtn.textContent = "Resend OTP";
                }
            } catch (err) {
                showAlert("Network error resending code.", "error");
                resendBtn.disabled = false;
                resendBtn.textContent = "Resend OTP";
            }
        }
    </script>
</body>
</html>
