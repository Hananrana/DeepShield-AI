<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — DeepShield AI</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png" />
    <link rel="stylesheet" href="/static/style.css">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        blue: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030712;
            font-family: 'Manrope', 'Inter', sans-serif;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .hero-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(99, 102, 241, 0.2);
                border-color: rgba(99, 102, 241, 0.2);
            }

            50% {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
                border-color: rgba(99, 102, 241, 0.6);
            }
        }

        .logo-pulse {
            animation: logoPulse 3s infinite ease-in-out;
        }
    </style>
</head>

<body class="text-slate-300 min-h-screen flex items-center justify-center p-6 hero-grid relative overflow-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[20%] left-[10%] w-[400px] h-[400px] bg-blue-600/10 blur-[130px] rounded-full"></div>
        <div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-indigo-600/5 blur-[130px] rounded-full">
        </div>
    </div>

    <div class="w-full max-w-md glass rounded-3xl p-8 shadow-2xl relative z-10 bg-[#070b14]/80">
        <div class="flex flex-col items-center mb-8">
            <a href="/" class="flex items-center gap-3 mb-4 group">
                <img src="/static/images/logo.png"
                    class="w-12 h-12 object-cover rounded-full shadow-lg border border-indigo-500/30 group-hover:border-indigo-400 transition-all duration-300 logo-pulse"
                    alt="DeepShield Logo">
            </a>
            <h2 class="text-white text-2xl font-bold tracking-tight">Reset Password</h2>
            <p class="text-slate-500 text-xs mt-1 font-mono uppercase tracking-wider">Account Recovery Console</p>
        </div> <!-- Dynamic Alert Container -->
        <div id="alertContainer" class="hidden mb-4 p-4 rounded-xl text-sm border transition-all duration-300"></div>

        <form id="forgotForm" class="space-y-5">
            <div>
                <label for="email"
                    class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Registered
                    Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" id="email" required
                        class="block w-full pl-10 pr-4 py-3 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                        placeholder="name@enterprise.com">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-sm tracking-wide transition-all duration-300 shadow-[0_4px_15px_rgba(99,102,241,0.2)] hover:shadow-[0_4px_25px_rgba(99,102,241,0.4)]">
                Send OTP
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-500 font-medium">
            Remember credentials?
            <a href="/login" class="text-indigo-400 hover:text-indigo-300 transition font-semibold">Log In</a>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5 flex flex-col items-center gap-2">
            <div
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] font-mono font-semibold uppercase tracking-wider">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                94.4% Detection Accuracy
            </div>
            <div class="text-[9px] font-mono text-slate-500 uppercase tracking-widest text-center leading-relaxed">
                RGB + FFT Fusion • Research Validated
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type) {
            const alertContainer = document.getElementById("alertContainer");
            alertContainer.textContent = message;
            alertContainer.classList.remove("hidden", "bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400", "bg-red-950/30", "border-red-500/30", "text-red-400");

            if (type === "success") {
                alertContainer.classList.add("bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400");
            } else {
                alertContainer.classList.add("bg-red-950/30", "border-red-500/30", "text-red-400");
            }
        }

        document.getElementById("forgotForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const submitBtn = document.getElementById("submitBtn");

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Sending OTP...';

            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            try {
                const response = await fetch("/api/forgot-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRF-Token": csrfToken
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    showAlert(data.message || "OTP sent successfully! Redirecting to verification...", "success");

                    if (data.debug_otp) {
                        setTimeout(() => {
                            showAlert(`[SIMULATION] Verification OTP for ${email} is: ${data.debug_otp}`, "success");
                        }, 800);
                    }

                    setTimeout(() => {
                        window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                    }, 3000);
                } else {
                    showAlert(data.error || "Failed to process request.", "error");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Send OTP";
                }
            } catch (err) {
                showAlert("Network error occurred. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Send OTP";
            }
        });
    </script>
    <script src="/static/js/main.js"></script>
</body>

</html>
