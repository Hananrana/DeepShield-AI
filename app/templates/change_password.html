<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — DeepShield AI</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png" />
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        blue: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030712;
            font-family: 'Manrope', 'Inter', sans-serif;
        }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .hero-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 60px 60px;
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center p-6 hero-grid relative overflow-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[20%] left-[10%] w-[400px] h-[400px] bg-blue-600/10 blur-[130px] rounded-full"></div>
        <div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-indigo-600/5 blur-[130px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md glass rounded-3xl p-8 shadow-2xl relative z-10 bg-[#070b14]/80">
        <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-[0_4px_15px_rgba(99,102,241,0.4)] mb-4">
                <i class="fa-solid fa-key text-white text-xl"></i>
            </div>
            <h2 class="text-white text-2xl font-bold tracking-tight">Change Password</h2>
            <p class="text-slate-500 text-xs mt-1 font-mono uppercase tracking-wider">Update Security Credentials</p>
        </div>

        <!-- Dynamic Alert Container -->
        <div id="alertContainer" class="hidden mb-4 p-4 rounded-xl text-sm border transition-all duration-300"></div>

        <form id="changePasswordForm" class="space-y-4">
            <!-- Current Password -->
            <div>
                <label for="current_password" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">Current Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="current_password" required
                        class="block w-full pl-10 pr-10 py-2.5 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePasswordVisibility('current_password', 'currentEye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                        <i class="fa-solid fa-eye" id="currentEye"></i>
                    </button>
                </div>
            </div>

            <!-- New Password & Confirm Grid -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="new_password" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">New Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="new_password" required oninput="checkPasswordStrength()"
                            class="block w-full pl-10 pr-10 py-2.5 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('new_password', 'newEye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <i class="fa-solid fa-eye" id="newEye"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="confirm_password" class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1.5">Confirm</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="confirm_password" required
                            class="block w-full pl-10 pr-10 py-2.5 bg-[#0B1220] border border-[#1F2937] rounded-xl text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('confirm_password', 'confirmEye')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <i class="fa-solid fa-eye" id="confirmEye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Password Strength Visual Meter -->
            <div class="mt-2 space-y-1">
                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden flex gap-1">
                    <div id="meter1" class="h-full bg-slate-800 flex-1 transition-all duration-300"></div>
                    <div id="meter2" class="h-full bg-slate-800 flex-1 transition-all duration-300"></div>
                    <div id="meter3" class="h-full bg-slate-800 flex-1 transition-all duration-300"></div>
                </div>
                <div class="flex justify-between items-center text-[10px] font-mono">
                    <span id="strengthText" class="text-slate-500 uppercase">Input Password</span>
                    <span class="text-slate-550">Min 8 chars, 1 upper, 1 special</span>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-sm tracking-wide transition-all duration-300 shadow-[0_4px_15px_rgba(99,102,241,0.2)] hover:shadow-[0_4px_25px_rgba(99,102,241,0.4)]">
                Update Password
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-slate-500 font-medium">
            <a href="/" class="text-indigo-400 hover:text-indigo-300 transition font-semibold flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-house text-[10px]"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        
        function togglePasswordVisibility(inputId, eyeId) {
            const pwdInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(eyeId);
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                pwdInput.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }

        let currentStrength = 0;

        function checkPasswordStrength() {
            const password = document.getElementById("new_password").value;
            const meter1 = document.getElementById("meter1");
            const meter2 = document.getElementById("meter2");
            const meter3 = document.getElementById("meter3");
            const strengthText = document.getElementById("strengthText");

            meter1.className = "h-full bg-slate-800 flex-1 transition-all duration-300";
            meter2.className = "h-full bg-slate-800 flex-1 transition-all duration-300";
            meter3.className = "h-full bg-slate-800 flex-1 transition-all duration-300";

            if (password.length === 0) {
                strengthText.textContent = "Input Password";
                strengthText.className = "text-slate-500 uppercase";
                currentStrength = 0;
                return;
            }

            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) score++;

            currentStrength = score;

            if (score === 1) {
                meter1.className = "h-full bg-red-500 flex-1 transition-all duration-300";
                strengthText.textContent = "Weak (Unsafe)";
                strengthText.className = "text-red-500 font-bold uppercase";
            } else if (score === 2) {
                meter1.className = "h-full bg-amber-500 flex-1 transition-all duration-300";
                meter2.className = "h-full bg-amber-500 flex-1 transition-all duration-300";
                strengthText.textContent = "Medium (Moderate)";
                strengthText.className = "text-amber-500 font-bold uppercase";
            } else if (score === 3) {
                meter1.className = "h-full bg-emerald-500 flex-1 transition-all duration-300";
                meter2.className = "h-full bg-emerald-500 flex-1 transition-all duration-300";
                meter3.className = "h-full bg-emerald-500 flex-1 transition-all duration-300";
                strengthText.textContent = "Strong (Secure)";
                strengthText.className = "text-emerald-500 font-bold uppercase";
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById("alertContainer");
            alertContainer.textContent = message;
            alertContainer.classList.remove("hidden", "bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400", "bg-red-950/30", "border-red-500/30", "text-red-400");
            
            if (type === "success") {
                alertContainer.classList.add("bg-emerald-950/30", "border-emerald-500/30", "text-emerald-400");
            } else {
                alertContainer.classList.add("bg-red-950/30", "border-red-500/30", "text-red-400");
            }
            alertContainer.classList.remove("hidden");
        }

        document.getElementById("changePasswordForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const current_password = document.getElementById("current_password").value;
            const new_password = document.getElementById("new_password").value;
            const confirm_password = document.getElementById("confirm_password").value;
            const submitBtn = document.getElementById("submitBtn");

            if (new_password !== confirm_password) {
                showAlert("New passwords do not match.", "error");
                return;
            }

            if (currentStrength < 3) {
                showAlert("Please select a stronger password (must be 'Strong (Secure)' for security compliance).", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Updating...';

            try {
                const response = await fetch("/api/change-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRF-Token": csrfToken
                    },
                    body: JSON.stringify({
                        current_password,
                        new_password,
                        confirm_password
                    })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    showAlert(data.message || "Password successfully changed!", "success");
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 2000);
                } else {
                    showAlert(data.error || "Failed to update password.", "error");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Update Password";
                }
            } catch (err) {
                showAlert("Network error occurred. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Update Password";
            }
        });
    </script>
</body>
</html>
